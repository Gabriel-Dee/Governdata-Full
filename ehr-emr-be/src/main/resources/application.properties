spring.application.name=ehr-emr-be

# Server
server.port=8080

# PostgreSQL (override with env in production)
spring.datasource.url=jdbc:postgresql://localhost:5432/ehr_emr
spring.datasource.username=gabriel
spring.datasource.password=07096
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA: Flyway applies schema first; update fills gaps for local dev (use validate in prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway (runs before Hibernate on startup; records applied scripts in flyway_schema_history)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# DBs that already have tables but no Flyway history (e.g. created via Hibernate): tag as baseline V7 so
# V1..V7 are not re-executed. Empty databases: Flyway runs V1..V7 from scratch (baseline is skipped).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=7
spring.flyway.baseline-description=Pre-Flyway or legacy schema aligned through V7

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=${spring.application.name}

# Governance platform (EHR backend calls POST /authorize before returning data)
governance.client.base-url=http://localhost:8081
governance.client.timeout-ms=5000
governance.client.enabled=true
governance.client.api-key=${GOVERNANCE_API_KEY:}
governance.client.audit-ingest-enabled=${GOVERNANCE_AUDIT_INGEST_ENABLED:true}
governance.client.source-system=${GOVERNANCE_SOURCE_SYSTEM:ehr-emr-be}
governance.client.tenant-key=${GOVERNANCE_TENANT_KEY:ehremr}
governance.client.default-region=${GOVERNANCE_DEFAULT_REGION:US}
governance.client.default-legal-basis=${GOVERNANCE_DEFAULT_LEGAL_BASIS:HIPAA}
governance.client.default-department=${GOVERNANCE_DEFAULT_DEPARTMENT:General}
governance.client.default-location=${GOVERNANCE_DEFAULT_LOCATION:hospital}
governance.client.default-consent-granted=${GOVERNANCE_DEFAULT_CONSENT_GRANTED:true}
governance.client.fail-open=${GOVERNANCE_FAIL_OPEN:false}

# API docs
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Local auth/JWT for health centre workers
ehr.security.jwt.issuer=health-centre-ehr
ehr.security.jwt.audience=ehr-backend
ehr.security.jwt.secret=change-me-local-dev-secret-key-change-me-12345
ehr.security.jwt.expiration-seconds=3600

# Data import (Healthcare data.csv)
ehr.import.healthcare-csv-path=data/Healthcare data.csv
# EMR CSV import: 0 = all rows (~51k; may take minutes). Set e.g. 3000 for faster local UI tests.
ehr.import.emr-max-rows=0

# CORS (comma-separated origins for browser SPAs)
ehr.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000
