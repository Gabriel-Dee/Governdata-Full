# Test profile: H2 in-memory, governance disabled
# Unique name per context so parallel / sequential SpringBootTests do not share one mem DB (avoids duplicate seed inserts).
spring.datasource.url=jdbc:h2:mem:ehr_test_${random.uuid};DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create schema from entities so tests don't depend on Flyway/PostgreSQL migrations
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:test-seed-data.sql
spring.flyway.enabled=false

governance.client.enabled=false

# EMR CSV import tests: cap rows so integration tests finish quickly
ehr.import.emr-max-rows=20
